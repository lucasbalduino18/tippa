                        // ===== USAR MESMA LÓGICA DOS BADGES =====
                        const totalLimitForStatus = state.goal + state.goalFixed;
                        
                        if (totalMonthWithFixed < totalLimitForStatus) {
                            statusIcon = '🟢';
                            statusColor = '#22c55e';
                            statusTitle = 'Abaixo do limite';
                        } else if (totalMonthWithFixed === totalLimitForStatus) {
                            statusIcon = '🟡';
                            statusColor = '#fbbf24';
                            statusTitle = 'No limite';
                        } else {
                            statusIcon = '🔴';
                            statusColor = '#ef4444';
                            statusTitle = 'Acima do limite';
                        }
                        
                        // Calcular economia para o badge
                        const normalizeMonthKeyBadge = (key) => {
                            const parts = key.split('/');
                            if (parts.length !== 2) return key;
                            const m = parseInt(parts[0]);
                            return m + '/' + parts[1];
                        };
                        const normalizedKeyBadge = normalizeMonthKeyBadge(monthYear);
                        const incomeForBadge = state.monthlyIncome[normalizedKeyBadge] || state.monthlyIncome[monthYear] || 0;
                        const economyForBadge = incomeForBadge - totalMonthWithFixed;
                        const hasIncomeBadge = incomeForBadge > 0;
                        
                        // Calcular percentual do rendimento (para tooltip)
                        const economyPercent = hasIncomeBadge ? (economyForBadge / incomeForBadge * 100) : 0;
                        
                        // ===== SISTEMA DE CORES BASEADO NOS LIMITES =====
                        const totalLimit = state.goal + state.goalFixed;  // Limite total (variável + fixa)
                        let badgeColor, badgeBg, badgeIcon;
                        
                        if (totalMonthWithFixed < totalLimit) {
                            // Verde - Abaixo do limite
                            badgeColor = '#22c55e';
                            badgeBg = 'rgba(34, 197, 94, 0.2)';
                            badgeIcon = '💚';
                        } else if (totalMonthWithFixed === totalLimit) {
                            // Amarelo - Exatamente no limite
                            badgeColor = '#f59e0b';
                            badgeBg = 'rgba(245, 158, 11, 0.2)';
                            badgeIcon = '⚠️';
                        } else {
                            // Vermelho - Acima do limite
                            badgeColor = '#ef4444';
                            badgeBg = 'rgba(239, 68, 68, 0.2)';
                            badgeIcon = '🔴';
                        }
                        
                        return `
                            <div class="month-group">
                                <div class="month-header" onclick="toggleMonth('${monthYear}')">
                                    <span style="display: flex; align-items: center; gap: 8px;">
                                        <span>${monthNames[month - 1]} ${year}</span>
                                        ${hasIncomeBadge ? `
                                            <span style="
                                                font-size: 0.7rem;
                                                padding: 4px 8px;
                                                background: ${badgeBg};
                                                border: 1px solid ${badgeColor};
                                                border-radius: 12px;
                                                color: ${badgeColor};
                                                font-weight: 700;
                                                white-space: nowrap;
                                                display: flex;
                                                align-items: center;
                                                gap: 4px;
                                            " title="${economyForBadge > 0 ? 'Guardou' : 'Déficit'} AED ${Math.abs(economyForBadge).toFixed(0)} (${Math.abs(economyPercent).toFixed(1)}% do rendimento)">
                                                ${badgeIcon}
                                                ${economyForBadge > 0 ? '+' : ''}${(economyForBadge / 1000).toFixed(1)}K
                                            </span>
                                        ` : ''}
                                    </span>
                                    <span style="display: flex; align-items: center; gap: 15px;">
                                        <span style="display: flex; align-items: center; gap: 8px;">
                                            <span title="${statusTitle}" style="font-size: 0.9rem;">${statusIcon}</span>
                                            <span>AED ${totalMonth.toFixed(2)}</span>
                                        </span>
                                        <span class="month-toggle ${isExpanded ? 'expanded' : ''}">▼</span>
                                    </span>
                                </div>
                                <div class="month-expenses ${isExpanded ? 'expanded' : ''}">
                                    ${(() => {
                                        // Normalizar chave do mês (remover zero à esquerda)
                                        const normalizeMonthKey = (key) => {
                                            const parts = key.split('/');
                                            if (parts.length !== 2) return key;
                                            const month = parseInt(parts[0]); // Remove zero à esquerda
                                            const year = parts[1];
                                            return month + '/' + year;
                                        };
                                        
                                        const normalizedMonthYear = normalizeMonthKey(monthYear);
                                        
                                        // Tentar ambos os formatos
                                        let monthIncome = state.monthlyIncome[normalizedMonthYear] || 
                                                         state.monthlyIncome[monthYear] || 0;
                                        
                                        // Debug no console (opcional - pode remover depois)
                                        if (normalizedMonthYear === '1/2026' || monthYear === '01/2026') {
                                            console.log('🔍 Debug Janeiro 2026:');
                                            console.log('  monthYear original:', monthYear);
                                            console.log('  normalizedMonthYear:', normalizedMonthYear);
                                            console.log('  monthIncome encontrado:', monthIncome);
                                            console.log('  Chaves disponíveis:', Object.keys(state.monthlyIncome));
                                        }
                                        
                                        if (monthIncome > 0) {
                                            const economy = monthIncome - totalMonthWithFixed;
                                            const economyPercent = (economy / monthIncome * 100);
                                            const isPositive = economy > 0;
                                            
                                            let html = '<div style="margin-bottom: 15px; padding: 15px; ';
                                            html += 'background: ' + (isPositive ? 'rgba(34, 197, 94, 0.1)' : 'rgba(239, 68, 68, 0.1)') + '; ';
                                            html += 'border-radius: 8px; ';
                                            html += 'border-left: 4px solid ' + (isPositive ? '#22c55e' : '#ef4444') + ';">';
                                            
                                            html += '<div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; font-size: 0.85rem;">';
                                            
                                            // Rendimento
                                            html += '<div><div style="opacity: 0.8;">💰 Rendimento</div>';
                                            html += '<div style="font-size: 1.1rem; font-weight: 700; color: #10b981;">AED ' + monthIncome.toFixed(0) + '</div></div>';
                                            
                                            // Despesas Variáveis
                                            html += '<div><div style="opacity: 0.8;">💸 Variáveis</div>';
                                            html += '<div style="font-size: 1.1rem; font-weight: 700; color: #ef4444;">AED ' + totalMonth.toFixed(0) + '</div></div>';
                                            
                                            // Despesas Fixas
                                            html += '<div><div style="opacity: 0.8;">🔒 Fixas</div>';
                                            html += '<div style="font-size: 1.1rem; font-weight: 700; color: #f59e0b;">AED ' + fixedMonthTotal.toFixed(0) + '</div></div>';
                                            
                                            // Total e Economia
                                            html += '<div style="grid-column: 1 / -1; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.2);">';
                                            html += '<div style="display: flex; justify-content: space-between; margin-bottom: 10px;">';
                                            html += '<div style="opacity: 0.8;">📊 Total Despesas</div>';
                                            html += '<div style="font-weight: 700;">AED ' + totalMonthWithFixed.toFixed(0) + '</div>';
                                            html += '</div>';
                                            html += '<div style="opacity: 0.8;">' + (isPositive ? '🎉' : '⚠️') + ' Economia</div>';
                                            html += '<div style="font-size: 1.3rem; font-weight: 700; color: ' + (isPositive ? '#22c55e' : '#ef4444') + ';">';
                                            html += (economy > 0 ? '+' : '') + 'AED ' + economy.toFixed(0) + '</div>';
                                            html += '<div style="font-size: 0.75rem; opacity: 0.7; margin-top: 5px;">';
                                            if (isPositive) {
                                                html += 'Você guardou ' + economyPercent.toFixed(1) + '% do seu rendimento!';
                                            } else {
                                                html += 'Gastou AED ' + Math.abs(economy).toFixed(0) + ' a mais que o rendimento';
                                            }
                                            html += '</div></div></div></div>';
                                            
                                            return html;
                                        }
                                        return '';
                                    })()}
                                    
                                    ${expenses.map(e => {
                                        const amount = parseFloat(e.amount) || 0;
                                        const merchant = e.merchant || 'Sem nome';
                                        const date = e.date || '';
                                        const time = e.time || '';
                                        const category = e.category || 'outros';
                                        const obs = e.obs || '';
                                        
                                        return `
                                        <div class="expense-item">
                                            <div class="expense-info">
                                                <div class="expense-merchant">${merchant}</div>
                                                <div class="expense-date">${date} às ${time}</div>
                                                ${obs ? `<div class="expense-date" style="font-style: italic; margin-top: 4px;">💬 ${obs}</div>` : ''}
                                                <span class="expense-category" style="background: ${getCategoryColor(category)}">
                                                    ${getCategoryIcon(category)} ${getCategoryName(category)}
                                                </span>
                                            </div>
                                            <div style="display:flex; align-items:center;">
                                                <div class="expense-amount">AED ${amount.toFixed(2)}</div>
                                                <button class="edit-btn" onclick="startEditExpense('${e.id}')">✏️</button>
                                                <button class="delete-btn" onclick="deleteExpense('${e.id}')">🗑️</button>
                                            </div>
                                        </div>
                                    `}).join('')}
                                </div>
                            </div>
                        `;
                    }).join('')
                }
                
                ${state.editingExpense ? `
                    <div class="modal" onclick="if(event.target === this) cancelEditExpense()">
                        <div class="modal-content">
                            <div class="modal-header">✏️ Editar Despesa</div>
                            
                            <div class="input-group">
                                <label class="label">Estabelecimento:</label>
                                <input type="text" class="input-field" value="${state.editingExpense.merchant}" 
                                       onchange="state.editingExpense.merchant = this.value">
                            </div>
                            
                            <div class="input-group">
                                <label class="label">Valor (AED):</label>
                                <input type="number" step="0.01" class="input-field" value="${state.editingExpense.amount}" 
                                       onchange="state.editingExpense.amount = parseFloat(this.value)">
                            </div>
                            
                            <div class="input-group">
                                <label class="label">Data (DD/MM/YYYY):</label>
                                <input type="text" class="input-field" value="${state.editingExpense.date}" 
                                       onchange="state.editingExpense.date = this.value">
                            </div>
                            
                            <div class="input-group">
                                <label class="label">Hora (HH:MM:SS):</label>
                                <input type="text" class="input-field" value="${state.editingExpense.time}" 
                                       onchange="state.editingExpense.time = this.value">
                            </div>
                            
                            <div class="input-group">
                                <label class="label">Observação (opcional):</label>
                                <input type="text" class="input-field" placeholder="Ex: Presente, Dividido..." value="${state.editingExpense.obs || ''}" 
                                       onchange="state.editingExpense.obs = this.value">
                            </div>
                            
                            <div class="input-group">
                                <label class="label">Categoria:</label>
                                <div class="category-list">
                                    ${CATEGORIES.map(cat => `
                                        <div class="category-item ${state.editingExpense.category === cat.id ? 'selected' : ''}" 
                                             onclick="state.editingExpense.category = '${cat.id}'; render()">
                                            <div class="category-icon">${cat.icon}</div>
                                            <div class="category-name">${cat.name}</div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                            
                            <div class="modal-buttons">
                                <button class="btn btn-secondary" onclick="cancelEditExpense()">Cancelar</button>
                                <button class="btn" onclick="saveEditExpense()">Salvar</button>
                            </div>
                        </div>
                    </div>
                ` : ''}
            `;
        }
    }

    // Inicializar
    loadData();
</script>

</body>
</html>
